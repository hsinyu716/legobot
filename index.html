<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTRA 機器人實作檢定一級・學科線上測驗</title>
<style>
  :root{
    --bg:#f3f5f9; --card:#ffffff; --ink:#1f2937; --muted:#6b7280;
    --line:#e3e7ef; --brand:#2563eb; --brand-d:#1d4ed8;
    --ok:#16a34a; --ok-bg:#e7f7ed; --bad:#dc2626; --bad-bg:#fdeaea;
    --pick:#eff4ff; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;-webkit-text-size-adjust:100%}
  header{background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff;padding:22px 16px;text-align:center}
  header h1{margin:0;font-size:clamp(18px,4.5vw,26px)}
  header p{margin:6px 0 0;opacity:.9;font-size:14px}
  .wrap{max-width:920px;margin:0 auto;padding:16px}
  .bar{position:sticky;top:0;z-index:20;background:rgba(243,245,249,.92);backdrop-filter:blur(6px);
       display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--line)}
  .bar .grow{flex:1 1 auto}
  .pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:14px;font-weight:600;box-shadow:var(--shadow)}
  button{font:inherit;cursor:pointer;border:none;border-radius:10px;padding:10px 18px;font-weight:700;transition:.15s}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover{background:var(--brand-d)}
  .btn-ghost{background:#fff;color:var(--brand);border:1px solid var(--line);box-shadow:var(--shadow)}
  .btn-ghost:hover{background:#f7f9ff}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:16px 0;box-shadow:var(--shadow)}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .qno{background:var(--brand);color:#fff;border-radius:8px;font-weight:800;padding:3px 10px;font-size:14px;white-space:nowrap}
  .qsrc{color:var(--muted);font-size:13px}
  .qimg{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;display:block;cursor:zoom-in}
  /* lightbox */
  .lb{position:fixed;inset:0;z-index:100;background:rgba(15,23,42,.88);display:none;
      align-items:center;justify-content:center;padding:24px;cursor:zoom-out;overflow:auto}
  .lb.open{display:flex}
  .lb-img{max-width:100%;max-height:100%;border-radius:8px;background:#fff;
          box-shadow:0 10px 40px rgba(0,0,0,.5);transition:transform .15s ease;transform-origin:center}
  .lb.zoomed{cursor:zoom-in;align-items:flex-start}
  .lb.zoomed .lb-img{max-width:none;max-height:none;width:200%;cursor:grab}
  .lb-close{position:fixed;top:14px;right:18px;z-index:101;background:rgba(255,255,255,.92);
            color:#1f2937;border-radius:50%;width:42px;height:42px;font-size:22px;font-weight:800;
            line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .lb-tip{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#e5e7eb;font-size:13px;pointer-events:none}
  .hint{font-size:13px;color:var(--muted);margin:8px 2px 4px}
  .opts{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
  @media(max-width:560px){.opts{grid-template-columns:1fr}}
  .opt{display:flex;align-items:flex-start;gap:9px;border:1.5px solid var(--line);border-radius:10px;
       padding:10px 12px;cursor:pointer;background:#fff;transition:.12s;user-select:none}
  .opt:hover{border-color:#b9c6e6;background:#fafbff}
  .opt.sel{border-color:var(--brand);background:var(--pick)}
  .opt input{display:none}
  .opt .n{flex:none;width:24px;height:24px;border-radius:50%;background:#eef2f9;color:#334155;
          font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
  .opt.sel .n{background:var(--brand);color:#fff}
  .opt .t{flex:1;font-size:15px}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg)}
  .opt.correct .n{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
  .opt.wrong .n{background:var(--bad);color:#fff}
  .verdict{margin-top:10px;font-weight:700;font-size:14px;display:none}
  .verdict.show{display:block}
  .verdict.r-ok{color:var(--ok)} .verdict.r-bad{color:var(--bad)}
  .result{position:sticky;bottom:0;z-index:20;background:#fff;border-top:1px solid var(--line);
          padding:14px 16px;box-shadow:0 -2px 10px rgba(16,24,40,.06)}
  .result .inner{max-width:920px;margin:0 auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .score{font-size:20px;font-weight:800}
  .score b{font-size:28px}
  /* stats */
  .statbox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:16px 0 0;box-shadow:var(--shadow)}
  .statbox h2{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:560px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
  .stat{background:#f7f9ff;border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
  .stat .v{font-size:22px;font-weight:800;color:var(--brand);line-height:1.2}
  .stat .v.ok{color:var(--ok)} .stat .v.bad{color:var(--bad)}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .statbox .tools{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .statbox .tools .note{font-size:12px;color:var(--muted)}
  .btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}
  .btn-danger{background:#fff;color:var(--bad);border:1px solid #f3c2c2}
  .btn-danger:hover{background:var(--bad-bg)}
  .badge-wrong{background:var(--bad-bg);color:var(--bad);border:1px solid #f3c2c2;border-radius:999px;
               font-size:12px;font-weight:700;padding:2px 9px;white-space:nowrap}
  .vstat{font-size:12px;color:var(--muted);margin-top:4px}
  .foot{text-align:center;color:var(--muted);font-size:13px;padding:24px 16px 60px}
  .unanswered{color:var(--bad);font-weight:700}
  a{color:var(--brand)}
</style>
</head>
<body>
<header>
  <h1>TTRA 機器人實作檢定一級・學科線上測驗</h1>
  <p>題庫共 300 題，每次隨機抽出 20 題</p>
</header>

<div class="bar">
  <span class="pill" id="progress">已作答 0 / 20</span>
  <span class="grow"></span>
  <button class="btn-ghost" id="reshuffle">🔀 重新抽題</button>
  <button class="btn-primary" id="submit">交卷</button>
</div>

<div class="wrap"><div class="statbox" id="statbox"></div></div>

<div class="wrap" id="quiz"></div>

<div class="lb" id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="關閉">×</button>
  <img class="lb-img" id="lbImg" src="" alt="放大檢視">
  <div class="lb-tip">點圖片可再放大／縮小，點背景或按 Esc 關閉</div>
</div>

<div class="result" id="resultBar" style="display:none">
  <div class="inner">
    <span class="score" id="scoreText"></span>
    <span class="grow"></span>
    <button class="btn-ghost" id="reviewBtn">查看解答</button>
    <button class="btn-primary" id="againBtn">再來一次</button>
  </div>
</div>

<div class="foot">
  資料來源：學科題庫公告（300 題）。答案經人工複核修正，詳見
  <a href="corrections.md">corrections.md</a>。本頁為靜態網頁，可直接部署於 GitHub Pages。
</div>

<script>
const TOTAL_PICK = 20;
let bank = [];      // all 300
let quiz = [];      // current 20
let answers = {};   // id -> chosen index (1-4)
let graded = false;

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ---- persistent state ----
const STATS_KEY='ttra_stats_v1';   // 累計（跨重新整理）：{id:{c,w}}
const SEEN_KEY='ttra_seen_v1';     // 本 session 已出現的題號（不重複出題）
let stats={}, seen=new Set();

function loadState(){
  try{ stats=JSON.parse(localStorage.getItem(STATS_KEY))||{}; }catch(e){ stats={}; }
  try{ seen=new Set(JSON.parse(sessionStorage.getItem(SEEN_KEY))||[]); }catch(e){ seen=new Set(); }
}
function saveStats(){ try{ localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }catch(e){} }
function saveSeen(){ try{ sessionStorage.setItem(SEEN_KEY, JSON.stringify([...seen])); }catch(e){} }

function pickQuiz(){
  // 優先抽本 session 尚未出現過的題目；不足時開啟新一輪
  let unseen = shuffle(bank.filter(q=>!seen.has(q.id)).map(q=>q.id));
  let chosen;
  if(unseen.length >= TOTAL_PICK){
    chosen = unseen.slice(0, TOTAL_PICK);
  }else{
    const rest = shuffle(bank.filter(q=>seen.has(q.id)).map(q=>q.id));
    chosen = unseen.concat(rest).slice(0, TOTAL_PICK);
    seen = new Set();            // 全部題目都出過一輪 → 重新開始計算「已出現」
  }
  chosen.forEach(id=>seen.add(id));
  saveSeen();
  const byid=Object.fromEntries(bank.map(q=>[q.id,q]));
  quiz = chosen.map(id=>byid[id]);
  answers = {}; graded = false;
  render();
  renderStats();
  document.getElementById('resultBar').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const root = document.getElementById('quiz');
  root.innerHTML = '';
  quiz.forEach((q, idx)=>{
    const card = document.createElement('div');
    card.className='card'; card.id='card-'+q.id;
    let optsHtml='';
    for(let i=1;i<=4;i++){
      const txt = (q.options && q.options[i-1]) ? q.options[i-1] : '';
      optsHtml += `<label class="opt" data-id="${q.id}" data-i="${i}">
        <input type="radio" name="q${q.id}" value="${i}">
        <span class="n">${i}</span>
        <span class="t">${txt ? esc(txt) : '選項 '+i}</span>
      </label>`;
    }
    const st=stats[q.id];
    const wrongBadge = (st && st.w>0)
      ? `<span class="badge-wrong" title="此題過去曾答錯">⚠ 曾答錯 ${st.w} 次</span>` : '';
    card.innerHTML = `
      <div class="qhead">
        <span class="qno">第 ${idx+1} 題</span>
        <span class="qsrc">（題庫第 ${q.id} 題）</span>
        ${wrongBadge}
      </div>
      <img class="qimg" src="${q.img}" alt="第 ${q.id} 題" loading="lazy">
      <div class="hint">請選擇正確答案（選項 1～4 對應題目圖中由左至右四欄）：</div>
      <div class="opts">${optsHtml}</div>
      <div class="verdict" id="v-${q.id}"></div>`;
    root.appendChild(card);
  });
  root.querySelectorAll('.opt').forEach(o=>{
    o.addEventListener('click',()=>{
      if(graded) return;
      const id=+o.dataset.id, i=+o.dataset.i;
      answers[id]=i;
      o.parentElement.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      o.classList.add('sel');
      o.querySelector('input').checked=true;
      updateProgress();
    });
  });
  updateProgress();
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function updateProgress(){
  document.getElementById('progress').textContent =
    `已作答 ${Object.keys(answers).length} / ${TOTAL_PICK}`;
}

function renderStats(){
  const ids=Object.keys(stats);
  let attempts=0, c=0, w=0, wrongQ=0, answeredQ=ids.length;
  ids.forEach(id=>{ const s=stats[id]; attempts+=s.c+s.w; c+=s.c; w+=s.w; if(s.w>0) wrongQ++; });
  const acc = attempts? Math.round(c/attempts*100) : 0;
  const seenN = seen.size;
  document.getElementById('statbox').innerHTML = `
    <h2>📊 學習統計</h2>
    <div class="stat-grid">
      <div class="stat"><div class="v">${seenN}/300</div><div class="l">本次已出現題數</div></div>
      <div class="stat"><div class="v">${attempts}</div><div class="l">累計作答題次</div></div>
      <div class="stat"><div class="v ok">${c}</div><div class="l">累計答對</div></div>
      <div class="stat"><div class="v bad">${w}</div><div class="l">累計答錯</div></div>
      <div class="stat"><div class="v">${acc}%</div><div class="l">正確率</div></div>
      <div class="stat"><div class="v">${answeredQ}/300</div><div class="l">作答過的題目</div></div>
      <div class="stat"><div class="v bad">${wrongQ}</div><div class="l">曾答錯題數</div></div>
      <div class="stat"><div class="v">${Math.max(0,300-seenN)}</div><div class="l">本次尚未出現</div></div>
    </div>
    <div class="tools">
      <button class="btn-danger btn-sm" id="resetStats">🗑 清除累計統計</button>
      <span class="note">統計與「曾答錯」標記會記錄在此瀏覽器；「本次已出現」於關閉分頁後重置。</span>
    </div>`;
  const rb=document.getElementById('resetStats');
  if(rb) rb.addEventListener('click', ()=>{
    if(confirm('確定要清除所有累計統計與「曾答錯」標記嗎？此動作無法復原。')){
      stats={}; saveStats(); render(); renderStats();
    }
  });
}

function grade(){
  const done = Object.keys(answers).length;
  if(done < TOTAL_PICK){
    const missing = quiz.filter(q=>!answers[q.id]).map((q,_,arr)=>quiz.indexOf(q)+1);
    if(!confirm(`還有 ${TOTAL_PICK-done} 題未作答，確定要交卷嗎？`)) return;
  }
  graded = true;
  let correct=0;
  quiz.forEach((q, idx)=>{
    const card=document.getElementById('card-'+q.id);
    const chosen=answers[q.id];
    const v=document.getElementById('v-'+q.id);
    card.querySelectorAll('.opt').forEach(o=>{
      const i=+o.dataset.i;
      o.style.cursor='default';
      if(i===q.answer) o.classList.add('correct');
      if(chosen===i && i!==q.answer) o.classList.add('wrong');
    });
    // 更新累計統計（未作答不計入對錯）
    const st = stats[q.id] || (stats[q.id]={c:0,w:0});
    if(chosen===q.answer){
      correct++; st.c++;
      seen.add(q.id);            // 答對 → 留在已出現名單，本輪內不再重複
      v.className='verdict show r-ok';
      v.innerHTML='✓ 答對了！正確答案：選項 '+q.answer
                  +`<div class="vstat">此題累計：答對 ${st.c} 次／答錯 ${st.w} 次</div>`;
    }else{
      if(chosen) st.w++;
      seen.delete(q.id);         // 答錯/未作答 → 放回題庫，之後仍會再出現複習
      v.className='verdict show r-bad';
      v.innerHTML = (chosen? '✗ 答錯了。':'（未作答）') + ' 正確答案：選項 '+q.answer
                      + (q.answerText? '（'+q.answerText+'）':'')
                      + `<div class="vstat">此題累計：答對 ${st.c} 次／答錯 ${st.w} 次　（已放回題庫複習）</div>`;
    }
  });
  saveStats(); saveSeen();
  renderStats();
  const pct=Math.round(correct/TOTAL_PICK*100);
  document.getElementById('scoreText').innerHTML =
    `得分：<b>${pct}</b> 分　答對 ${correct} / ${TOTAL_PICK} 題`;
  document.getElementById('resultBar').style.display='block';
  document.getElementById('progress').textContent='已交卷';
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('submit').addEventListener('click', grade);
document.getElementById('reshuffle').addEventListener('click', ()=>{
  if(graded || Object.keys(answers).length===0 || confirm('重新抽題會清除目前作答，確定嗎？')) pickQuiz();
});
document.getElementById('againBtn').addEventListener('click', pickQuiz);
document.getElementById('reviewBtn').addEventListener('click', ()=>{
  document.getElementById('quiz').scrollIntoView({behavior:'smooth'});
});

// ---- lightbox ----
const lb=document.getElementById('lightbox'), lbImg=document.getElementById('lbImg');
function openLB(src,alt){
  lbImg.src=src; lbImg.alt=alt||'放大檢視';
  lb.classList.add('open'); lb.classList.remove('zoomed');
  document.body.style.overflow='hidden';
}
function closeLB(){
  lb.classList.remove('open','zoomed');
  document.body.style.overflow='';
  lbImg.src='';
}
document.getElementById('quiz').addEventListener('click',e=>{
  const img=e.target.closest('img.qimg');
  if(img){ openLB(img.src, img.alt); }
});
lbImg.addEventListener('click',e=>{ e.stopPropagation(); lb.classList.toggle('zoomed'); });
lb.addEventListener('click', closeLB);
document.getElementById('lbClose').addEventListener('click', e=>{ e.stopPropagation(); closeLB(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && lb.classList.contains('open')) closeLB(); });

fetch('questions.json')
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d=>{ bank=d; loadState(); pickQuiz(); })
  .catch(e=>{
    document.getElementById('quiz').innerHTML =
      `<div class="card" style="color:#dc2626">
        無法載入題庫 questions.json：${e.message}。<br>
        若為本機開啟，請改用本機伺服器（例如 <code>python3 -m http.server</code>）或直接部署到 GitHub Pages。
      </div>`;
  });
</script>
</body>
</html>
